<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Venda Revistas</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
        background: #f4fbf8;
        color: #0f172a;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, #d7f6ea 0%, transparent 36%),
          linear-gradient(180deg, #f8fffb 0%, #eef7f2 100%);
      }

      main {
        width: min(92vw, 28rem);
        padding: 2rem;
        border-radius: 1.5rem;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 24px 60px rgba(15, 118, 110, 0.12);
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: 1.4rem;
      }

      p {
        margin: 1rem 0 0;
        line-height: 1.6;
        color: #475569;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Venda Revistas</h1>
      <p>Carregando o painel da aplicacao...</p>
    </main>
  </body>
</html>
